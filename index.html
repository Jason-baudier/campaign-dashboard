<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Lemlist Campaign Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350;
      --accent: #6c63ff; --green: #22c55e; --yellow: #eab308; --red: #ef4444;
      --text: #e2e8f0; --muted: #94a3b8; --radius: 14px; --sidebar: 268px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; line-height: 1.6; }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar); height: 100vh; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; z-index: 100; transition: transform .3s;
    }
    #sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo { font-size: 13px; font-weight: 800; letter-spacing: .05em; color: #a5a0ff; text-transform: uppercase; margin-bottom: 3px; }
    .sidebar-sub { font-size: 11px; color: var(--muted); }
    #campaigns-list { flex: 1; overflow-y: auto; padding: 12px 10px; }
    .campaign-btn {
      width: 100%; text-align: left; background: none; border: 1px solid transparent;
      border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all .15s;
      color: var(--text); margin-bottom: 4px;
    }
    .campaign-btn:hover { background: var(--surface2); border-color: var(--border); }
    .campaign-btn.active { background: rgba(108,99,255,.12); border-color: rgba(108,99,255,.4); }
    .cam-id { font-size: 12px; font-weight: 700; color: #a5a0ff; letter-spacing: .06em; }
    .cam-week { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .cam-badges { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
    .cam-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; }
    .cb-green { background: rgba(34,197,94,.15); color: var(--green); }
    .cb-yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
    .cb-red { background: rgba(239,68,68,.15); color: var(--red); }
    .cb-gray { background: rgba(148,163,184,.1); color: var(--muted); }

    /* ── MAIN ── */
    #main { margin-left: var(--sidebar); flex: 1; min-width: 0; }

    /* ── HEADER ── */
    #page-header {
      background: linear-gradient(135deg, #1a1d27 0%, #12142080 100%);
      border-bottom: 1px solid var(--border);
      padding: 48px 32px 40px; position: relative; overflow: hidden;
    }
    #page-header::before {
      content: ''; position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
      width: 500px; height: 300px;
      background: radial-gradient(ellipse, rgba(108,99,255,.22) 0%, transparent 70%);
      pointer-events: none;
    }
    .badge { display: inline-block; background: rgba(108,99,255,.18); border: 1px solid rgba(108,99,255,.45); color: #a5a0ff; font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 4px 14px; border-radius: 999px; margin-bottom: 18px; }
    #page-header h1 { font-size: clamp(22px, 3.5vw, 34px); font-weight: 700; letter-spacing: -.02em; margin-bottom: 8px; }
    #page-header .sub { color: var(--muted); font-size: 14px; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 22px; }
    .pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: 5px 16px; font-size: 13px; color: var(--muted); }
    .pill strong { color: var(--text); }

    /* ── CONTENT ── */
    #content { max-width: 1020px; padding: 40px 28px 80px; display: flex; flex-direction: column; gap: 40px; }
    .section-title { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* KPI CARDS */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 20px; transition: border-color .2s, transform .2s; }
    .kpi-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .kpi-card .label { font-size: 11px; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: .07em; }
    .kpi-card .value { font-size: 30px; font-weight: 700; letter-spacing: -.02em; }
    .kpi-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* CHART */
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px; }
    .chart-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
    .chart-card p { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
    .chart-wrapper { position: relative; height: 280px; }

    /* SEGMENTS TABLE */
    .segments { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .seg-header, .seg-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 2fr; align-items: center; padding: 13px 22px; gap: 8px; }
    .seg-header { background: var(--surface2); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
    .seg-row { border-bottom: 1px solid var(--border); font-size: 13px; transition: background .15s; }
    .seg-row:last-child { border-bottom: none; }
    .seg-row:hover { background: var(--surface2); }
    .seg-name { font-weight: 600; }
    .seg-tag { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 999px; font-weight: 600; }
    .tag-green { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .tag-yellow { background: rgba(234,179,8,.15); color: var(--yellow); border: 1px solid rgba(234,179,8,.3); }
    .tag-red { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
    .tag-gray { background: rgba(148,163,184,.1); color: var(--muted); border: 1px solid rgba(148,163,184,.2); }
    .rate-bar-wrap { display: flex; align-items: center; gap: 9px; }
    .rate-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
    .rate-bar-fill { height: 100%; border-radius: 999px; transition: width .6s ease; }
    .rate-val { font-size: 13px; font-weight: 600; min-width: 34px; text-align: right; }
    .note-cell { font-size: 12px; color: var(--muted); }

    /* TAKEAWAYS */
    .takeaways-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 16px; }
    .takeaway { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; display: flex; gap: 16px; align-items: flex-start; transition: border-color .2s; }
    .takeaway:hover { border-color: var(--accent); }
    .takeaway .num { font-size: 22px; font-weight: 800; color: rgba(108,99,255,.35); line-height: 1; min-width: 26px; }
    .takeaway .body h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .takeaway .body p { font-size: 13px; color: var(--muted); line-height: 1.55; }

    /* LEADS */
    .leads-list { display: flex; flex-direction: column; gap: 12px; }
    .lead-card { background: var(--surface); border-radius: var(--radius); padding: 18px 22px; display: flex; align-items: flex-start; gap: 14px; }
    .lead-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .lead-org { font-size: 12px; font-weight: 500; margin-bottom: 3px; }
    .lead-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .lead-note { font-size: 13px; color: var(--muted); line-height: 1.5; }

    /* TWO COL */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }
    .list-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
    .list-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    .list-card ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .list-card li { display: flex; gap: 10px; font-size: 13px; line-height: 1.55; color: var(--muted); }
    .list-card li .icon { flex-shrink: 0; margin-top: 2px; }

    /* NEXT ACTIONS */
    .actions-list { display: flex; flex-direction: column; gap: 10px; }
    .action-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; display: flex; align-items: flex-start; gap: 14px; transition: border-color .2s; }
    .action-item:hover { border-color: var(--accent); }
    .action-num { font-size: 11px; font-weight: 700; background: rgba(108,99,255,.18); color: #a5a0ff; border-radius: 6px; padding: 2px 8px; flex-shrink: 0; }
    .action-text { font-size: 13px; line-height: 1.55; }
    .action-text strong { color: var(--text); }
    .action-text span { color: var(--muted); }

    /* KPI SNAPSHOT */
    .kpi-snapshot { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .kpi-snapshot-header { background: var(--surface2); padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .kpi-snapshot-header h3 { font-size: 15px; font-weight: 700; }
    .kpi-warning { font-size: 12px; color: var(--yellow); background: rgba(234,179,8,.1); border: 1px solid rgba(234,179,8,.25); border-radius: 999px; padding: 3px 12px; }
    .kpi-snapshot-body { display: grid; grid-template-columns: 1fr 1fr; }
    @media (max-width: 640px) { .kpi-snapshot-body { grid-template-columns: 1fr; } }
    .kpi-snapshot-col { padding: 22px; border-right: 1px solid var(--border); }
    .kpi-snapshot-col:last-child { border-right: none; }
    .kpi-snapshot-col h4 { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .kpi-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid rgba(46,51,80,.5); font-size: 13px; gap: 12px; }
    .kpi-row:last-child { border-bottom: none; }
    .kpi-row .kr-label { color: var(--muted); white-space: nowrap; }
    .kpi-row .kr-val { font-weight: 600; text-align: right; }

    /* MOBILE */
    #menu-toggle { display: none; position: fixed; top: 14px; left: 14px; z-index: 200; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 11px; cursor: pointer; color: var(--text); font-size: 18px; line-height: 1; }
    @media (max-width: 880px) {
      #menu-toggle { display: block; }
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0; }
    }

    footer { text-align: center; padding: 22px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }

    /* ── VIEW TABS ── */
    .view-tabs { display: flex; gap: 4px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .view-tab { flex: 1; background: none; border: 1px solid transparent; border-radius: 8px; padding: 7px 8px; font-size: 11px; font-weight: 700; letter-spacing: .04em; color: var(--muted); cursor: pointer; transition: all .15s; text-align: center; }
    .view-tab:hover { background: var(--surface2); color: var(--text); }
    .view-tab.active { background: rgba(108,99,255,.15); border-color: rgba(108,99,255,.4); color: #a5a0ff; }

    /* ── REPLY ANALYSIS ── */
    .reply-filter-bar { display: flex; flex-wrap: wrap; gap: 8px; }
    .reply-filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 6px 16px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all .15s; }
    .reply-filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .reply-filter-btn.active { background: rgba(108,99,255,.15); border-color: rgba(108,99,255,.4); color: #a5a0ff; }

    .reply-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 12px; }
    .reply-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 14px; text-align: center; cursor: pointer; transition: border-color .15s; }
    .reply-stat:hover { border-color: rgba(108,99,255,.4); }
    .reply-stat .rs-val { font-size: 24px; font-weight: 700; }
    .reply-stat .rs-label { font-size: 10px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; line-height: 1.4; }

    .reply-list { display: flex; flex-direction: column; gap: 14px; }
    .reply-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; transition: border-color .2s; }
    .reply-card:hover { border-color: rgba(108,99,255,.35); }
    .reply-card-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .tone-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
    .tone-hot              { background: rgba(34,197,94,.15);   color: #22c55e;  border: 1px solid rgba(34,197,94,.35); }
    .tone-warm             { background: rgba(96,217,250,.12);  color: #60d9fa;  border: 1px solid rgba(96,217,250,.3); }
    .tone-not_interested   { background: rgba(239,68,68,.12);   color: #ef4444;  border: 1px solid rgba(239,68,68,.3); }
    .tone-already_equipped { background: rgba(234,179,8,.12);   color: #eab308;  border: 1px solid rgba(234,179,8,.3); }
    .tone-ambiguous        { background: rgba(148,163,184,.1);  color: #94a3b8;  border: 1px solid rgba(148,163,184,.2); }
    .tone-wrong_target     { background: rgba(249,115,22,.12);  color: #f97316;  border: 1px solid rgba(249,115,22,.3); }
    .tone-bug              { background: rgba(168,85,247,.12);  color: #a855f7;  border: 1px solid rgba(168,85,247,.3); }
    .reply-cam-tag { font-size: 11px; font-weight: 600; background: rgba(108,99,255,.12); color: #a5a0ff; border-radius: 5px; padding: 2px 8px; }
    .reply-meta { font-size: 11px; color: var(--muted); }
    .reply-contact { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .reply-org { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .reply-text { font-size: 14px; color: var(--text); font-style: italic; border-left: 3px solid var(--border); padding-left: 14px; margin-bottom: 12px; line-height: 1.55; }
    .reply-interp { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .reply-interp strong { color: #a5a0ff; font-weight: 600; }
    .reply-msg-link { display: inline-block; margin-top: 10px; font-size: 11px; color: var(--muted); background: var(--surface2); border-radius: 6px; padding: 4px 12px; border: 1px solid var(--border); }
  </style>
</head>
<body>

<button id="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div class="sidebar-logo">📊 Campaign Dashboard</div>
    <div class="sidebar-sub">Lemlist · Outbound P27 France</div>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" id="tab-campaigns" onclick="switchView('campaigns')">Campaigns</button>
    <button class="view-tab" id="tab-replies" onclick="switchView('replies')">Reply Analysis</button>
  </div>
  <div id="campaigns-list"></div>
</nav>

<div id="main">
  <div id="page-header"></div>
  <div id="content"></div>
  <footer>Lemlist Campaign Dashboard · P27 France · Built with Claude</footer>
</div>

// ═══════════════════════════════════════════════════════════════════
//  RENDERING ENGINE — no need to modify below
// ═══════════════════════════════════════════════════════════════════
let currentChart = null;

function buildSidebar() {
  document.getElementById('campaigns-list').innerHTML = CAMPAIGNS.map((c, i) => `
    <button class="campaign-btn ${i === 0 ? 'active' : ''}" onclick="selectCampaign(${i}, this)">
      <div class="cam-id">${c.id} ${c.batch}</div>
      <div class="cam-week">Week of ${c.week}</div>
      <div class="cam-badges">
        ${c.sidebarBadges.map(b => `<span class="cam-badge ${b.cls}">${b.text}</span>`).join('')}
      </div>
    </button>
  `).join('');
}

function selectCampaign(index, btn) {
  document.querySelectorAll('.campaign-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderCampaign(CAMPAIGNS[index]);
  if (window.innerWidth <= 880) closeSidebar();
}

function renderCampaign(c) {
  renderHeader(c);
  renderContent(c);
}

function renderHeader(c) {
  document.getElementById('page-header').innerHTML = `
    <div class="badge">Weekly Lemlist Campaign Analysis</div>
    <h1>${c.id} ${c.batch} — ${c.region}</h1>
    <p class="sub">Week of ${c.week} · ${c.kpis[0].value} campaigns analyzed</p>
    <div class="pill-row">
      <span class="pill">${c.batch} only</span>
      <span class="pill">Tone: <strong>${c.tone}</strong></span>
      <span class="pill"><strong>Multi-touch</strong> sequence validated</span>
    </div>
  `;
}

function renderContent(c) {
  if (currentChart) { currentChart.destroy(); currentChart = null; }
  const el = document.getElementById('content');
  el.innerHTML =
    renderKpis(c) +
    renderChartSection(c) +
    renderSegments(c) +
    renderTakeaways(c) +
    (c.leads && c.leads.length ? renderLeads(c) : '') +
    renderAnalysis(c) +
    renderNextActions(c) +
    renderKpiSnapshot(c);

  initChart(c);

  // Animate progress bars
  const bars = el.querySelectorAll('.rate-bar-fill');
  const widths = Array.from(bars).map(b => b.style.width);
  bars.forEach(b => b.style.width = '0');
  setTimeout(() => bars.forEach((b, i) => { b.style.width = widths[i]; }), 120);
}

function renderKpis(c) {
  return `<section>
    <div class="section-title">Overview</div>
    <div class="kpi-grid">
      ${c.kpis.map(k => `
        <div class="kpi-card">
          <div class="label">${k.label}</div>
          <div class="value" style="color:${k.color}">${k.value}</div>
          <div class="sub">${k.sub}</div>
        </div>`).join('')}
    </div>
  </section>`;
}

function renderChartSection(c) {
  return `<section>
    <div class="section-title">Performance by Segment</div>
    <div class="chart-card">
      <h3>Reply Rate by ICP</h3>
      <p>Average reply rate per segment · ${c.batch} · ${c.week}</p>
      <div class="chart-wrapper"><canvas id="replyChart"></canvas></div>
    </div>
  </section>`;
}

function initChart(c) {
  const ctx = document.getElementById('replyChart');
  if (!ctx) return;
  const bg   = { '#22c55e': 'rgba(34,197,94,.85)',   '#eab308': 'rgba(234,179,8,.85)',  '#94a3b8': 'rgba(148,163,184,.6)', '#ef4444': 'rgba(239,68,68,.75)' };
  const bdr  = { '#22c55e': 'rgba(34,197,94,1)',      '#eab308': 'rgba(234,179,8,1)',    '#94a3b8': 'rgba(148,163,184,.9)', '#ef4444': 'rgba(239,68,68,1)'   };
  currentChart = new Chart(ctx.getContext('2d'), {
    type: 'bar',
    data: {
      labels: c.segments.map(s => `${s.name} (${s.code})`),
      datasets: [{
        label: 'Reply Rate (%)',
        data: c.segments.map(s => s.replyRate),
        backgroundColor: c.segments.map(s => bg[s.replyColor]  || 'rgba(148,163,184,.6)'),
        borderColor:     c.segments.map(s => bdr[s.replyColor] || 'rgba(148,163,184,.9)'),
        borderWidth: 2, borderRadius: 8, borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1d27', borderColor: '#2e3350', borderWidth: 1,
          titleColor: '#e2e8f0', bodyColor: '#94a3b8', padding: 12,
          callbacks: { label: ctx => ` ${ctx.parsed.y}% reply rate` }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(46,51,80,.5)' }, ticks: { color: '#94a3b8', font: { size: 12 } } },
        y: { grid: { color: 'rgba(46,51,80,.5)' }, ticks: { color: '#94a3b8', font: { size: 12 }, callback: v => v + '%' }, min: 0 }
      }
    }
  });
}

function renderSegments(c) {
  return `<section>
    <div class="section-title">Segment Breakdown</div>
    <div class="segments">
      <div class="seg-header">
        <span>Segment</span><span>Contacts</span><span>Deliverability</span><span>Reply Rate</span><span>Key Note</span>
      </div>
      ${c.segments.map(s => {
        const pct = s.replyMax > 0 ? (s.replyRate / s.replyMax * 100).toFixed(0) : 0;
        return `<div class="seg-row">
          <span class="seg-name">${s.name} <span style="color:var(--muted);font-weight:400">(${s.code})</span></span>
          <span>${s.contacts}</span>
          <span><span class="seg-tag ${s.delivClass}">${s.delivLabel}</span></span>
          <div class="rate-bar-wrap">
            <div class="rate-bar"><div class="rate-bar-fill" style="width:${pct}%;background:${s.replyColor}"></div></div>
            <span class="rate-val" style="color:${s.replyColor}">${s.replyRate}%</span>
          </div>
          <span class="note-cell">${s.note}</span>
        </div>`;
      }).join('')}
    </div>
  </section>`;
}

function renderTakeaways(c) {
  return `<section>
    <div class="section-title">Key Takeaways</div>
    <div class="takeaways-grid">
      ${c.takeaways.map((t, i) => `
        <div class="takeaway">
          <div class="num">${i + 1}</div>
          <div class="body"><h4>${t.title}</h4><p>${t.body}</p></div>
        </div>`).join('')}
    </div>
  </section>`;
}

function renderLeads(c) {
  return `<section>
    <div class="section-title">Leads & Warm Signals</div>
    <div class="leads-list">
      ${c.leads.map(l => `
        <div class="lead-card" style="border:1px solid ${l.borderColor}">
          <div class="lead-dot" style="background:${l.dotColor}"></div>
          <div>
            <div class="lead-org" style="color:${l.orgColor}">${l.org}</div>
            <div class="lead-name">${l.name}</div>
            <p class="lead-note">${l.note}${l.cta ? ` <strong style="color:${l.ctaColor}">${l.cta}</strong>` : ''}</p>
          </div>
        </div>`).join('')}
    </div>
  </section>`;
}

function renderAnalysis(c) {
  const col = { red: '#ef4444', yellow: '#eab308', green: '#22c55e' };
  return `<section>
    <div class="section-title">Cross-Campaign Analysis</div>
    <div class="two-col">
      <div class="list-card">
        <h3>✅ What Worked</h3>
        <ul>
          ${c.whatWorked.map(t => `<li><span class="icon" style="color:#22c55e">▸</span><span>${t}</span></li>`).join('')}
        </ul>
      </div>
      <div class="list-card">
        <h3>❌ What Didn't Work</h3>
        <ul>
          ${c.whatDidnt.map(t => `<li><span class="icon" style="color:${col[t.level] || '#94a3b8'}">▸</span><span>${t.text}</span></li>`).join('')}
        </ul>
      </div>
    </div>
  </section>`;
}

function renderNextActions(c) {
  return `<section>
    <div class="section-title">Next Actions</div>
    <div class="actions-list">
      ${c.nextActions.map((a, i) => `
        <div class="action-item" ${a.highlight ? 'style="border-color:rgba(34,197,94,.4)"' : ''}>
          <span class="action-num">${i + 1}</span>
          <div class="action-text">${a.text}</div>
        </div>`).join('')}
    </div>
  </section>`;
}

function renderKpiSnapshot(c) {
  const rows = arr => arr.map(r => `
    <div class="kpi-row">
      <span class="kr-label">${r.label}</span>
      <span class="kr-val"${r.color ? ` style="color:${r.color}"` : ''}>${r.val}</span>
    </div>`).join('');
  return `<section>
    <div class="section-title">KPI Snapshot</div>
    <div class="kpi-snapshot">
      <div class="kpi-snapshot-header">
        <h3>Full Metrics Summary · ${c.kpiSnapshot.batchLabel}</h3>
        <span class="kpi-warning">⚠ Open rates unreliable (tracking limitations)</span>
      </div>
      <div class="kpi-snapshot-body">
        <div class="kpi-snapshot-col"><h4>${c.kpiSnapshot.batchLabel}</h4>${rows(c.kpiSnapshot.batch)}</div>
        <div class="kpi-snapshot-col"><h4>Global</h4>${rows(c.kpiSnapshot.global)}</div>
      </div>
    </div>
  </section>`;
}

// ── VIEW SWITCHER ──────────────────────────────────────────────────
const TONE_META = {
  hot:              { label: '🔥 Hot Lead',        color: '#22c55e' },
  warm:             { label: '✅ Warm',             color: '#60d9fa' },
  not_interested:   { label: '❌ Not Interested',   color: '#ef4444' },
  already_equipped: { label: '🔄 Already Equipped', color: '#eab308' },
  ambiguous:        { label: '🤔 Ambiguous',        color: '#94a3b8' },
  wrong_target:     { label: '⚠️ Wrong Target',    color: '#f97316' },
  bug:              { label: '🐛 Template Bug',     color: '#a855f7' },
};

let activeFilter = 'all';

function switchView(view) {
  document.getElementById('tab-campaigns').classList.toggle('active', view === 'campaigns');
  document.getElementById('tab-replies').classList.toggle('active', view === 'replies');
  document.getElementById('campaigns-list').style.display = view === 'campaigns' ? '' : 'none';
  if (view === 'campaigns') {
    const active = document.querySelector('.campaign-btn.active');
    const idx = active ? [...document.querySelectorAll('.campaign-btn')].indexOf(active) : 0;
    renderCampaign(CAMPAIGNS[idx] || CAMPAIGNS[0]);
  } else {
    activeFilter = 'all';
    renderReplyView();
  }
}

function renderReplyView() {
  const counts = {};
  REPLIES.forEach(r => { counts[r.tone] = (counts[r.tone] || 0) + 1; });
  const filtered = activeFilter === 'all' ? REPLIES : REPLIES.filter(r => r.tone === activeFilter);

  document.getElementById('page-header').innerHTML = `
    <div class="badge">REPLY ANALYSIS</div>
    <h1>Reply Tone &amp; Intent Analysis</h1>
    <p class="sub">${REPLIES.length} replies across all campaigns · Classified by tone and intent</p>
    <div class="pill-row">
      ${Object.entries(TONE_META).filter(([k]) => counts[k]).map(([k, m]) =>
        `<div class="pill"><strong style="color:${m.color}">${counts[k]}</strong>&nbsp;${m.label}</div>`
      ).join('')}
    </div>`;

  document.getElementById('content').innerHTML = `
    <section>
      <div class="section-title">Summary</div>
      <div class="reply-summary-grid">
        <div class="reply-stat" onclick="setFilter('all')" style="${activeFilter==='all'?'border-color:rgba(108,99,255,.5)':''}">
          <div class="rs-val" style="color:#a5a0ff">${REPLIES.length}</div>
          <div class="rs-label">All Replies</div>
        </div>
        ${Object.entries(TONE_META).filter(([k]) => counts[k]).map(([k, m]) => `
          <div class="reply-stat" onclick="setFilter('${k}')" style="${activeFilter===k?`border-color:${m.color}`:''}">
            <div class="rs-val" style="color:${m.color}">${counts[k]}</div>
            <div class="rs-label">${m.label}</div>
          </div>`).join('')}
      </div>
    </section>

    <section>
      <div class="section-title">Filter</div>
      <div class="reply-filter-bar">
        <button class="reply-filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All (${REPLIES.length})</button>
        ${Object.entries(TONE_META).filter(([k]) => counts[k]).map(([k, m]) =>
          `<button class="reply-filter-btn ${activeFilter===k?'active':''}" onclick="setFilter('${k}')">${m.label} (${counts[k]})</button>`
        ).join('')}
      </div>
    </section>

    <section>
      <div class="section-title">Replies — ${filtered.length} shown</div>
      <div class="reply-list">
        ${filtered.map(r => renderReplyCard(r)).join('')}
      </div>
    </section>`;
}

function setFilter(tone) {
  activeFilter = tone;
  renderReplyView();
}

function renderReplyCard(r) {
  const m = TONE_META[r.tone] || { label: r.tone, color: '#94a3b8' };
  return `
    <div class="reply-card">
      <div class="reply-card-header">
        <span class="tone-badge tone-${r.tone}">${m.label}</span>
        <span class="reply-cam-tag">${r.campaign}</span>
        <span class="reply-meta">${r.channel} · ${r.date} · sender: ${r.sender}</span>
      </div>
      <div class="reply-contact">${r.contactName || r.contact}</div>
      <div class="reply-org">${r.org}${r.org !== r.contact ? ` · <span style="color:var(--muted);font-size:11px">${r.contact}</span>` : ''}</div>
      <div class="reply-text">"${r.text}"</div>
      <div class="reply-interp">${r.interpretation}</div>
      ${r.messagingLink ? `<div class="reply-msg-link">${r.messagingLink}</div>` : ''}
    </div>`;
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function closeSidebar()   { document.getElementById('sidebar').classList.remove('open'); }

// Init
buildSidebar();
if (CAMPAIGNS.length > 0) renderCampaign(CAMPAIGNS[0]);
</script>
</body>
</html>
